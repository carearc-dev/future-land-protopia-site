name: Deploy to Sakura

# main にマージ／push されたら、さくらサーバーへ SFTP（SSH鍵）で自動デプロイします。
# 公開フォルダ: ~/www/futurelandprotopia.jp/
#
# 必要な Secrets:
#   FTP_SERVER       … さくらのサーバ名（例: xxxx.sakura.ne.jp）
#   FTP_USERNAME     … SSH/FTP のアカウント名
#   SSH_PRIVATE_KEY  … デプロイ用SSH秘密鍵（公開鍵はサーバーの ~/.ssh/authorized_keys に登録済み）
#
# 安全設計:
#   - config.php（問い合わせ設定・サーバー側）は除外＝温存
#   - --delete は使わない＝リポジトリに無いサーバー側ファイルは消さない
#   ※ FTPSはさくらのデータ接続と相性が悪く不可だったため、単一接続のSFTPに切替済み

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-sakura
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: SSH鍵とknown_hostsを準備
        env:
          KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          S: ${{ secrets.FTP_SERVER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p 22 -T 15 "$S" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SFTP (lftp mirror)
        env:
          S: ${{ secrets.FTP_SERVER }}
          U: ${{ secrets.FTP_USERNAME }}
        run: |
          lftp -u "$U", "sftp://$S" -e "
            set sftp:connect-program 'ssh -a -x -i $HOME/.ssh/id_deploy -o IdentitiesOnly=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts';
            mirror -R --verbose \
              --exclude-glob '.git*' \
              --exclude-glob '*.md' \
              --exclude-glob 'config.php' \
              --exclude-glob '.ftp-deploy-sync-state.json' \
              ./ www/futurelandprotopia.jp/;
            bye"
